<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端部署</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f7f9; font-family: system-ui, sans-serif; padding: 20px; display: flex; justify-content: center; }
        .app { max-width: 1000px; width: 100%; display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        .main-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { margin-bottom: 15px; font-size: 18px; color: #333; }
        .editor { width: 100%; height: 400px; padding: 15px; font-family: monospace; border: 1px solid #ddd; border-radius: 10px; resize: none; outline: none; }
        .editor:focus { border-color: #007bff; }
        
        .side-panel { display: flex; flex-direction: column; gap: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn:disabled { background: #ccc; }
        
        .log-box { background: #1c1c1c; color: #00ff00; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; height: 200px; overflow-y: auto; margin-top: 10px; }
        .history-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 13px; }
        .del-link { color: #ff4d4d; cursor: pointer; }
    </style>
</head>
<body>

<div class="app">
    <div class="main-card">
        <h2>📄网站部署</h2>
        <textarea id="codeArea" class="editor" placeholder="在此粘贴你的 HTML 代码..."></textarea>
        <p style="margin-top:10px; font-size:12px; color:#666;">* 请确保你的 GitHub 仓库中已手动创建过一次 db.json 文件，内容为 {}</p>
    </div>

    <div class="side-panel">
        <div class="card">
            <button class="btn" id="runBtn">🚀 开始上传</button>
            <div class="log-box" id="logBox">>> 系统准备就绪...</div>
        </div>

        <div class="card">
            <h3>历史记录</h3>
            <div id="history"></div>
        </div>
    </div>
</div>

<script>
    (function() {
        "use strict";

        const P1 = "Z2hwX2ZZdGVNQzllYzFzRW1ZdThS"; 
        const P2 = "ZGp0VUtZTWN3YzE3YTNWWks0bA==";
        
        const CFG = {
            OWNER: "youxiaoyu26",
            REPO: "ceshi",
            DB: "db.json"
        };

        
        const getToken = () => atob(P1 + P2);

        const log = (msg, isErr = false) => {
            const box = document.getElementById('logBox');
            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            if(isErr) div.style.color = '#ff6b6b';
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        };

    
        async function ghReq(path, method = 'GET', body = null) {
            const url = `https://api.github.com/repos/${CFG.OWNER}/${CFG.REPO}/contents/${path}`;
            const opt = {
                method,
                headers: {
                    'Authorization': `token ${getToken()}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                }
            };
            if(body) opt.body = JSON.stringify(body);
            
            const res = await fetch(url, opt);
            
        
            if (!res.ok) {
                const errInfo = await res.json().catch(() => ({}));
                if (res.status === 401) throw new Error("Token失效！(GitHub已封禁此Key)");
                if (res.status === 404) throw new Error("找不到路径！(检查用户名和仓库名)");
                if (res.status === 422) throw new Error("文件冲突或格式错误(SHA不匹配)");
                throw new Error(errInfo.message || `请求失败(${res.status})`);
            }
            return res.json();
        }


        const toB64 = (str) => btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (m, p) => String.fromCharCode('0x' + p)));

        async function startDeploy() {
            const code = document.getElementById('codeArea').value.trim();
            if(!code) return log("❌ 请输入内容", true);

            const btn = document.getElementById('runBtn');
            btn.disabled = true;
            
            const siteId = Math.random().toString(36).substring(2, 8).toUpperCase();
            const filePath = `sites/${siteId}/index.html`;

            try {
                log(`正在检查仓库状态...`);
                
            
                log(`正在上传站点文件...`);
                await ghReq(filePath, 'PUT', {
                    message: `add site ${siteId}`,
                    content: toB64(code)
                });

            
                log(`正在同步数据库...`);
                let sha = null;
                let dbData = {};

                const dbRes = await fetch(`https://api.github.com/repos/${CFG.OWNER}/${CFG.REPO}/contents/${CFG.DB}`, {
                    headers: { 'Authorization': `token ${getToken()}` }
                });

                if(dbRes.ok) {
                    const json = await dbRes.json();
                    sha = json.sha;
                    dbData = JSON.parse(decodeURIComponent(escape(atob(json.content))));
                }

                const uid = localStorage.getItem('deploy_uid') || 'user_' + Math.random().toString(36).slice(2,7);
                localStorage.setItem('deploy_uid', uid);

                if(!dbData[uid]) dbData[uid] = [];
                dbData[uid].push({
                    id: siteId,
                    url: `https://${CFG.OWNER}.github.io/${CFG.REPO}/${filePath}`,
                    time: new Date().toLocaleString()
                });

                await ghReq(CFG.DB, 'PUT', {
                    message: "update db",
                    content: toB64(JSON.stringify(dbData)),
                    sha: sha
                });

                log(`✅ 全部完成！ID: ${siteId}`, false);
                loadHistory();
            } catch (e) {
                log(`❌ 失败: ${e.message}`, true);
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        }

        async function loadHistory() {
            const histBox = document.getElementById('history');
            try {
                const res = await fetch(`https://api.github.com/repos/${CFG.OWNER}/${CFG.REPO}/contents/${CFG.DB}?t=${Date.now()}`);
                if(!res.ok) return histBox.innerHTML = "无记录";
                const json = await res.json();
                const db = JSON.parse(decodeURIComponent(escape(atob(json.content))));
                const uid = localStorage.getItem('deploy_uid');
                const mySites = db[uid] || [];
                
                histBox.innerHTML = mySites.reverse().map(s => `
                    <div class="history-item">
                        <a href="${s.url}" target="_blank">🔗 ${s.id}</a>
                        <span class="del-link" onclick="alert('请手动在仓库删除文件')">删除</span>
                    </div>
                `).join('');
            } catch(e) {}
        }

        document.getElementById('runBtn').onclick = startDeploy;
        loadHistory();

    })();
</script>

</body>
</html>
