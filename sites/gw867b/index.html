<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校园网 · 轻社区</title>
    <style>
        :root { --primary-color: #007AFF; --bg-color: #f4f4f7; --card-bg: white; --text-primary: #333; --border-color: #eee; --danger-color: #ff3b30; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); color: var(--text-primary); transition: 0.3s; min-height: 100vh; }
        #auth-screen { position: fixed; inset: 0; background: var(--card-bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-container { width: 85%; max-width: 350px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 12px; background: var(--bg-color); outline: none; }
        .auth-btn { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; }
        #main-app { display: none; }
        header { background: var(--card-bg); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; border-bottom: 1px solid var(--border-color); z-index: 100; }
        .search-area { padding: 0 12px 10px; background: var(--bg-color); }
        .search-input { width: 100%; padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--card-bg); outline: none; }
        .categories-container { display: flex; overflow-x: auto; padding: 15px 12px; gap: 8px; }
        .category-item { background: var(--card-bg); padding: 8px 18px; border-radius: 40px; font-size: 14px; white-space: nowrap; border: 1px solid var(--border-color); cursor: pointer; }
        .category-item.active { background: var(--primary-color); color: white; }
        .post-card { background: var(--card-bg); padding: 18px; border-radius: 20px; margin: 0 12px 16px; border: 1px solid var(--border-color); position: relative; }
        .post-header { display: flex; align-items: center; margin-bottom: 10px; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 10px; object-fit: cover; }
        .media-preview { width: 100%; border-radius: 12px; margin-top: 10px; max-height: 400px; object-fit: contain; background: #000; }
        .del-btn { position: absolute; top: 15px; right: 15px; color: var(--danger-color); font-size: 12px; cursor: pointer; border: 1px solid var(--danger-color); padding: 2px 6px; border-radius: 6px; }
        .post-actions { display: flex; gap: 15px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border-color); }
        .action-btn { font-size: 13px; color: #666; cursor: pointer; }
        .comment-box { margin-top: 10px; background: #f8f8f8; padding: 10px; border-radius: 10px; display: none; }
        .sidebar { position: fixed; right: -300px; top: 0; width: 300px; height: 100%; background: var(--card-bg); transition: 0.3s; z-index: 200; padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        .sidebar.active { right: 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; }
        .fab { position: fixed; right: 20px; bottom: 30px; width: 56px; height: 56px; background: var(--primary-color); border-radius: 28px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; z-index: 90; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-container">
        <h2 id="auth-info">📡 正在同步校园动态...</h2>
        <div id="auth-form" style="display:none; margin-top:20px;">
            <input type="text" id="auth-user" class="auth-input" placeholder="用户名">
            <input type="password" id="auth-pass" class="auth-input" placeholder="密码">
            <button class="auth-btn" id="auth-main-btn" onclick="handleAuth()">进入社区</button>
            <button class="auth-btn" style="background:none; color:#999; margin-top:10px;" onclick="toggleAuthMode()">切换注册</button>
        </div>
    </div>
</div>

<div id="main-app">
    <header><h2 id="main-header-title">🎓 校园圈</h2><div onclick="openSidebar()" style="font-size:24px; cursor:pointer;">☰</div></header>
    <div class="categories-container" id="category-bar"></div>
    <div class="search-area"><input type="text" class="search-input" id="q" placeholder="🔍 搜索帖子、作者或标签..." oninput="renderPosts()"></div>
    <div id="post-list"></div>
    <div class="fab" onclick="showPostModal()">+</div>
</div>

<div id="sidebar" class="sidebar">
    <div onclick="closeSidebar()" style="float:right; cursor:pointer;">✕</div>
    <h3 style="margin-top:20px;">个人设置</h3>
    <div style="text-align:center; margin:20px 0;">
        <img id="my-avatar" src="" onclick="document.getElementById('avatar-file').click()" style="width:80px; height:80px; border-radius:50%; object-fit: cover; border: 2px solid var(--primary-color); cursor:pointer;">
        <input type="file" id="avatar-file" hidden accept="image/*" onchange="uploadAvatar(this)">
        <p id="my-name" style="font-weight:bold; margin-top:10px;"></p>
    </div>
    <button class="auth-btn" style="background:var(--bg-color); color:var(--danger-color);" onclick="logout()">退出登录</button>
</div>

<div id="postModal" class="modal">
    <div class="modal-content">
        <h3>✨ 发布动态</h3>
        <input type="text" id="p-title" class="auth-input" placeholder="标题">
        <textarea id="p-content" class="auth-input" rows="3" placeholder="说点什么..."></textarea>
        <input type="file" id="p-media" class="auth-input" accept="image/*,video/*" onchange="processMedia(this)">
        <select id="p-tag" class="auth-input"></select>
        <button class="auth-btn" id="subBtn" onclick="submitPost()">🚀 立即发布</button>
        <button class="auth-btn" style="background:none; color:#999; margin-top:10px;" onclick="hidePostModal()">取消</button>
    </div>
</div>

<script>
(function(){
    "use strict";
    // ---------- 配置 ----------
    const DATA_REPO = { U: "youxiaoyu26", R: "campus-posts" };
    const CONF_REPO = { U: "youxiaoyu26", R: "ye" };
    // 加密后的 token (AES-256-GCM, 密码: qwertyuiop)
    const ENCRYPTED_TOKEN = "KGf/Mju2rl/b3LseqevfOEWcr+7PQxHK8lEZViFWRagFYyYzpzPugbWlPsoORtblFS0Q66TzW1JGDB2QjJ63DZdXO5z3Zn9/xLFL3RJMoMPOfA1H";
    let MY_TOKEN = null;          // 解密后会填充

    let currentUser = null, allPosts = [], categories = ["校园生活","表白墙","失物招领","二手买卖","学术交流"];
    let currentTab = "全部", selectedMedia = null;

    // ---------- 以下为 AES-256-GCM 解密（与加密工具完全一致）----------
    function base64ToArrayBuffer(base64) {
        const binary = atob(base64);
        const len = binary.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
    }

    async function deriveKey(password, salt) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
            'raw',
            enc.encode(password),
            { name: 'PBKDF2' },
            false,
            ['deriveKey']
        );
        return crypto.subtle.deriveKey(
            {
                name: 'PBKDF2',
                salt: salt,
                iterations: 100000,
                hash: 'SHA-256'
            },
            keyMaterial,
            { name: 'AES-GCM', length: 256 },
            false,
            ['decrypt']
        );
    }

    async function decryptAES256(encryptedBase64, password) {
        if (!encryptedBase64 || !password) throw new Error('密文和密码不能为空');
        const fullBuffer = base64ToArrayBuffer(encryptedBase64);
        const fullArray = new Uint8Array(fullBuffer);
        
        const saltLen = 16;
        const ivLen = 12;
        const tagLen = 16;
        if (fullArray.length < saltLen + ivLen + tagLen) throw new Error('无效的密文格式');
        
        const salt = fullArray.slice(0, saltLen);
        const iv = fullArray.slice(saltLen, saltLen + ivLen);
        const authTag = fullArray.slice(saltLen + ivLen, saltLen + ivLen + tagLen);
        const ciphertext = fullArray.slice(saltLen + ivLen + tagLen);
        
        const cryptoKey = await deriveKey(password, salt);
        
        const encryptedWithTag = new Uint8Array(ciphertext.length + authTag.length);
        encryptedWithTag.set(ciphertext, 0);
        encryptedWithTag.set(authTag, ciphertext.length);
        
        try {
            const decrypted = await crypto.subtle.decrypt(
                {
                    name: 'AES-GCM',
                    iv: iv,
                    tagLength: 128
                },
                cryptoKey,
                encryptedWithTag.buffer
            );
            const decoder = new TextDecoder();
            return decoder.decode(decrypted);
        } catch (err) {
            throw new Error('解密失败：密码错误或数据已损坏');
        }
    }

    // ---------- 安全 Base64 编解码 (支持 UTF-8) ----------
    function safeBtoa(str) {
        return btoa(unescape(encodeURIComponent(str)));
    }
    function safeAtob(str) {
        return decodeURIComponent(escape(atob(str)));
    }

    // ---------- 初始化 Token (自动解密) ----------
    async function initToken() {
        try {
            const plainToken = await decryptAES256(ENCRYPTED_TOKEN, "qwertyuiop");
            MY_TOKEN = plainToken;
            console.log("✅ Token 解密成功，前8位:", MY_TOKEN.substring(0,8));
        } catch (err) {
            console.error("❌ Token 解密失败:", err);
            alert("Token 解密失败！请确保：\n1. 使用 HTTPS 或 localhost 访问（Web Crypto API 要求）\n2. 密码正确\n3. 密文未损坏");
            throw err;
        }
    }

    // ---------- 更新云端计数文件 ----------
    async function updateJsonFile(filename, delta) {
        if (!MY_TOKEN) throw new Error("Token 未就绪");
        const url = `https://api.github.com/repos/${DATA_REPO.U}/${DATA_REPO.R}/contents/${filename}`;
        const headers = { 'Authorization': `token ${MY_TOKEN}` };
        let sha = null;
        let currentValue = 0;
        let existingData = null;

        try {
            const getRes = await fetch(url, { headers });
            if (getRes.ok) {
                const fileData = await getRes.json();
                sha = fileData.sha;
                const rawContent = fileData.content.replace(/\s/g, '');
                const decoded = safeAtob(rawContent);
                existingData = JSON.parse(decoded);
                currentValue = (typeof existingData === 'number') ? existingData : (existingData.count || existingData.visits || existingData.today || 0);
            } else if (getRes.status === 404) {
                console.log(`📄 ${filename} 不存在，将创建新文件`);
            } else {
                throw new Error(`获取文件状态失败: ${getRes.status}`);
            }
        } catch (e) {
            console.warn(`读取 ${filename} 时出错，将尝试创建新文件:`, e);
        }

        const newValue = Math.max(0, currentValue + delta);
        const newData = (existingData && typeof existingData === 'object' && !Array.isArray(existingData)) 
            ? { ...existingData, count: newValue } 
            : { count: newValue };

        const contentEncoded = safeBtoa(JSON.stringify(newData, null, 2));
        const body = {
            message: `Update ${filename} (${delta > 0 ? '+' : ''}${delta})`,
            content: contentEncoded
        };
        if (sha) body.sha = sha;

        try {
            const putRes = await fetch(url, {
                method: 'PUT',
                headers,
                body: JSON.stringify(body)
            });
            if (!putRes.ok) {
                const err = await putRes.json();
                throw new Error(err.message || '更新失败');
            }
            console.log(`✅ ${filename} 更新成功，当前值: ${newValue}`);
        } catch (e) {
            console.error(`❌ 更新 ${filename} 失败:`, e);
            alert(`云端计数更新失败: ${e.message}`);
        }
    }

    async function incrementOnLogin() {
        await updateJsonFile('fw.json', 1);
        await updateJsonFile('zxrs.json', 1);
    }

    async function decrementOnLogout() {
        await updateJsonFile('zxrs.json', -1);
    }

    // ---------- 加载云端主题配置 ----------
    async function loadThemeConfig() {
        if (!MY_TOKEN) return;
        try {
            const url = `https://api.github.com/repos/${DATA_REPO.U}/${DATA_REPO.R}/contents/theme_config.json`;
            const res = await fetch(url, { headers: { 'Authorization': `token ${MY_TOKEN}` } });
            if (!res.ok) {
                console.warn('theme_config.json 不存在或无法访问，使用默认主题');
                return;
            }
            const fileData = await res.json();
            const decoded = safeAtob(fileData.content);
            const config = JSON.parse(decoded);
            
            if (config.primaryColor) {
                document.documentElement.style.setProperty('--primary-color', config.primaryColor);
            }
            if (config.headerTitle) {
                const headerTitleEl = document.getElementById('main-header-title');
                if (headerTitleEl) headerTitleEl.innerText = config.headerTitle;
            }
            if (config.pageTitle) {
                document.title = config.pageTitle;
            }
            if (config.bgColor) {
                document.documentElement.style.setProperty('--bg-color', config.bgColor);
            }
            if (config.cardBg) {
                document.documentElement.style.setProperty('--card-bg', config.cardBg);
            }
            console.log('✅ 云端主题配置已应用');
        } catch (e) {
            console.warn('加载主题配置出错，使用默认样式', e);
        }
    }

    // ---------- 初始化 ----------
    async function init() {
        await initToken();          // 先解密出 MY_TOKEN（失败会弹出alert并终止）
        try {
            const res = await fetch(`https://api.github.com/repos/${CONF_REPO.U}/${CONF_REPO.R}/contents/secret.json`, { 
                headers: { 'Authorization': `token ${MY_TOKEN}` } 
            });
            if(res.ok) { 
                document.getElementById('auth-form').style.display = "block"; 
                document.getElementById('auth-info').innerText="系统已就绪"; 
            } else {
                document.getElementById('auth-info').innerText="网络异常，请刷新";
            }
        } catch(e) {
            document.getElementById('auth-info').innerText="连接失败，检查网络，如果您有开抓包请关闭抓包停止用，否则将追究您法律责任❗️";
        }
    }

    // 处理媒体文件
    window.processMedia = function(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => { 
            selectedMedia = { 
                data: e.target.result, 
                type: file.type.startsWith('image') ? 'img' : 'video' 
            }; 
        };
        reader.readAsDataURL(file);
    };

    // 上传头像
    window.uploadAvatar = async function(input) {
        const file = input.files[0]; if(!file || !currentUser) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64 = e.target.result;
            const url = `https://api.github.com/repos/${DATA_REPO.U}/${DATA_REPO.R}/contents/users/${currentUser.username}.json`;
            try {
                const g = await fetch(`${url}?t=${Date.now()}`, { headers: { 'Authorization': `token ${MY_TOKEN}` } });
                if(!g.ok) throw new Error("获取用户信息失败");
                const f = await g.json();
                currentUser.avatar = base64;
                await fetch(url, { 
                    method: 'PUT', 
                    headers: { 'Authorization': `token ${MY_TOKEN}` }, 
                    body: JSON.stringify({ 
                        message: "更新头像", 
                        content: safeBtoa(JSON.stringify(currentUser)), 
                        sha: f.sha 
                    }) 
                });
                document.getElementById('my-avatar').src = base64;
                alert("头像已更新");
            } catch(err) { 
                alert("上传失败: " + err.message); 
            }
        };
        reader.readAsDataURL(file);
    };

    // 登录/注册
    window.handleAuth = async function() {
        const u = document.getElementById('auth-user').value.trim();
        const p = document.getElementById('auth-pass').value.trim();
        if(!u || !p) return alert("请填写用户名和密码");
        
        const isReg = document.getElementById('auth-main-btn').innerText.includes('注册');
        const url = `https://api.github.com/repos/${DATA_REPO.U}/${DATA_REPO.R}/contents/users/${u}.json`;
        
        try {
            if(isReg) {
                const newUser = {
                    username: u,
                    password: p,
                    avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + u,
                    bio: ""
                };
                const res = await fetch(url, { 
                    method:'PUT', 
                    headers:{'Authorization':`token ${MY_TOKEN}`}, 
                    body:JSON.stringify({
                        message:"新用户注册",
                        content: safeBtoa(JSON.stringify(newUser))
                    })
                });
                if(res.ok) {
                    alert("注册成功，请登录");
                    toggleAuthMode();
                } else if(res.status === 422) {
                    alert("用户名已存在");
                } else {
                    alert("注册失败");
                }
            } else {
                const res = await fetch(`${url}?t=${Date.now()}`, { 
                    headers:{'Authorization':`token ${MY_TOKEN}`} 
                });
                if(!res.ok) return alert("用户不存在");
                const data = await res.json();
                const user = JSON.parse(safeAtob(data.content));
                if(user.password === p) { 
                    currentUser = user; 
                    await incrementOnLogin();
                    startApp(); 
                } else {
                    alert("密码错误");
                }
            }
        } catch(e) { 
            alert("网络请求失败"); 
        }
    };

    async function startApp() {
        await loadThemeConfig();
        
        document.getElementById('auth-screen').style.display='none'; 
        document.getElementById('main-app').style.display='block';
        document.getElementById('my-name').innerText = currentUser.username; 
        document.getElementById('my-avatar').src = currentUser.avatar || "https://api.dicebear.com/7.x/avataaars/svg?seed=" + currentUser.username;
        renderTabs(); 
        loadPosts();
    }

    window.logout = async function() {
        if(confirm("确定退出？")) {
            await decrementOnLogout();
            currentUser = null;
            location.reload();
        }
    };

    window.like = async (fn) => {
        const post = allPosts.find(p => p._fn === fn);
        if(!post) return;
        post.likes = (post.likes || 0) + 1;
        await updatePost(fn, post);
        renderPosts();
    };

    window.addComment = async (fn) => {
        const input = document.getElementById('in-'+fn);
        const txt = input.value.trim(); 
        if(!txt) return;
        const post = allPosts.find(p => p._fn === fn);
        if(!post) return;
        if(!post.comments) post.comments = [];
        post.comments.push({ user: currentUser.username, text: txt, time: new Date().toLocaleTimeString() });
        await updatePost(fn, post);
        input.value = ""; 
        renderPosts();
        document.getElementById('cb-'+fn).style.display = 'block';
    };

    async function updatePost(fileName, postData) {
        const url = `https://api.github.com/repos/${DATA_REPO.U}/${DATA_REPO.R}/contents/posts/${fileName}`;
        try {
            const g = await fetch(`${url}?t=${Date.now()}`, { 
                headers: { 'Authorization': `token ${MY_TOKEN}` } 
            });
            if(!g.ok) throw new Error("获取文件失败");
            const f = await g.json();
            const res = await fetch(url, { 
                method: 'PUT', 
                headers: { 'Authorization': `token ${MY_TOKEN}` }, 
                body: JSON.stringify({ 
                    message: "更新动态", 
                    content: safeBtoa(JSON.stringify(postData)), 
                    sha: f.sha 
                }) 
            });
            if(!res.ok) throw new Error("更新失败");
        } catch(e) {
            alert("操作失败: " + e.message);
            await loadPosts();
        }
    }

    window.toggleCom = (id) => {
        const e = document.getElementById('cb-'+id);
        e.style.display = e.style.display === 'block' ? 'none' : 'block';
    };

    window.deletePost = async (fn) => {
        if(!confirm("确定删除？")) return;
        const url = `https://api.github.com/repos/${DATA_REPO.U}/${DATA_REPO.R}/contents/posts/${fn}`;
        try {
            const g = await fetch(`${url}?t=${Date.now()}`, { headers: { 'Authorization': `token ${MY_TOKEN}` } });
            if(!g.ok) throw new Error("获取文件信息失败");
            const f = await g.json();
            const res = await fetch(url, { 
                method: 'DELETE', 
                headers: { 'Authorization': `token ${MY_TOKEN}` }, 
                body: JSON.stringify({ message: "删除动态", sha: f.sha }) 
            });
            if(res.ok) {
                alert("删除成功");
                await loadPosts();
            } else {
                throw new Error("删除失败");
            }
        } catch(e) {
            alert("删除失败: " + e.message);
        }
    };

    window.submitPost = async function() {
        const title = document.getElementById('p-title').value.trim();
        const content = document.getElementById('p-content').value.trim();
        const tag = document.getElementById('p-tag').value;
        if(!title || !content) return alert("请填写标题和内容");

        const btn = document.getElementById('subBtn'); 
        btn.disabled = true;
        btn.innerText = "发布中...";
        
        const fileName = `p_${Date.now()}.json`;
        const postData = { 
            title, content, tag, 
            author: currentUser.username, 
            avatar: currentUser.avatar || "https://api.dicebear.com/7.x/avataaars/svg?seed=" + currentUser.username, 
            time: new Date().toLocaleString(), 
            media: selectedMedia || null, 
            likes: 0, 
            comments: [] 
        };

        try {
            const res = await fetch(`https://api.github.com/repos/${DATA_REPO.U}/${DATA_REPO.R}/contents/posts/${fileName}`, { 
                method: 'PUT', 
                headers: { 'Authorization': `token ${MY_TOKEN}` }, 
                body: JSON.stringify({ 
                    message: "发布新动态", 
                    content: safeBtoa(JSON.stringify(postData)) 
                }) 
            });
            if(!res.ok) throw new Error((await res.json()).message || "发布失败");
            hidePostModal(); 
            document.getElementById('p-title').value = "";
            document.getElementById('p-content').value = "";
            document.getElementById('p-media').value = "";
            selectedMedia = null; 
            await loadPosts(); 
            alert("发布成功！");
        } catch(e) {
            alert("发布失败: " + e.message);
        } finally {
            btn.disabled = false; 
            btn.innerText = "🚀 立即发布";
        }
    };

    async function loadPosts() {
        if (!MY_TOKEN) {
            console.error("MY_TOKEN 未就绪，无法加载帖子");
            document.getElementById('post-list').innerHTML = '<div style="text-align:center; padding:40px; color:#999;">❌ Token 未初始化，请检查控制台</div>';
            return;
        }
        try {
            const res = await fetch(`https://api.github.com/repos/${DATA_REPO.U}/${DATA_REPO.R}/contents/posts?t=${Date.now()}`, { 
                headers:{'Authorization':`token ${MY_TOKEN}`} 
            });
            if(!res.ok) {
                if(res.status === 404) { 
                    allPosts = []; 
                    renderPosts(); 
                    return; 
                }
                const errText = await res.text();
                console.error(`加载帖子失败: ${res.status} ${errText}`);
                throw new Error(`HTTP ${res.status}`);
            }
            const files = await res.json();
            if(!Array.isArray(files)) { allPosts = []; renderPosts(); return; }
            
            const posts = await Promise.all(files.filter(f => f.name.endsWith('.json')).map(async f => {
                try {
                    const fr = await fetch(f.download_url + `?t=${Date.now()}`);
                    if(!fr.ok) return null;
                    const data = await fr.json();
                    data._fn = f.name;
                    return data;
                } catch(e) { return null; }
            }));
            allPosts = posts.filter(p => p !== null).sort((a,b) => new Date(b.time) - new Date(a.time));
            renderPosts();
        } catch(e) {
            console.warn("加载帖子出错", e);
            allPosts = [];
            renderPosts();
            document.getElementById('post-list').innerHTML = '<div style="text-align:center; padding:40px; color:#999;">⚠️ 加载失败，请检查网络或 Token 权限</div>';
        }
    }

    function renderPosts() {
        const kw = document.getElementById('q').value.toLowerCase();
        const filtered = allPosts.filter(p => 
            (currentTab === "全部" || p.tag === currentTab) && 
            (p.title?.toLowerCase().includes(kw) || 
             p.content?.toLowerCase().includes(kw) || 
             p.author?.toLowerCase().includes(kw))
        );
        
        const container = document.getElementById('post-list');
        if(!filtered.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px; color:#999;">📭 暂无动态</div>';
            return;
        }
        
        container.innerHTML = filtered.map(p => `
            <div class="post-card">
                ${(p.author === currentUser?.username || currentUser?.username === "柚小屿") ? 
                    `<div class="del-btn" onclick="deletePost('${p._fn}')">删除</div>` : ''}
                <div class="post-header">
                    <img src="${p.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + p.author}" class="post-avatar" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=fallback'">
                    <div>
                        <b>${escapeHtml(p.author)}</b>
                        <br><small style="color:#999">${p.time}</small>
                    </div>
                </div>
                <div style="font-weight:bold;margin:8px 0;">${escapeHtml(p.title)}</div>
                <div style="font-size:14px;color:#444; white-space:pre-wrap;">${escapeHtml(p.content)}</div>
                
                ${p.media ? (
                    p.media.type === 'img' ? 
                    `<img src="${p.media.data}" class="media-preview" onerror="this.style.display='none'">` : 
                    `<video src="${p.media.data}" class="media-preview" controls></video>`
                ) : ''}
                
                <div class="post-tag" style="margin-top:10px; color:var(--primary-color); font-size:12px;"># ${escapeHtml(p.tag)}</div>
                <div class="post-actions">
                    <div class="action-btn" onclick="like('${p._fn}')">❤️ ${p.likes || 0}</div>
                    <div class="action-btn" onclick="toggleCom('${p._fn}')">💬 ${(p.comments || []).length}</div>
                </div>
                <div class="comment-box" id="cb-${p._fn}">
                    <div style="max-height:150px; overflow-y:auto;">
                        ${(p.comments || []).map(c => `
                            <div style="font-size:12px;margin-bottom:4px;">
                                <b>${escapeHtml(c.user)}:</b> ${escapeHtml(c.text)}
                                <span style="color:#aaa; font-size:10px; margin-left:8px;">${c.time || ''}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div style="display:flex;margin-top:8px;">
                        <input type="text" id="in-${p._fn}" class="auth-input" style="margin:0;padding:6px;font-size:12px;" placeholder="写评论...">
                        <button onclick="addComment('${p._fn}')" style="background:var(--primary-color);color:white;border:none;border-radius:8px;padding:0 12px;margin-left:5px;font-size:12px;">发送</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function escapeHtml(text) {
        if(!text) return text;
        const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
        return String(text).replace(/[&<>"']/g, c => map[c]);
    }

    function renderTabs() {
        document.getElementById('category-bar').innerHTML = ["全部", ...categories].map(c => 
            `<div class="category-item ${currentTab===c?'active':''}" onclick="setTab('${c}')">${c}</div>`
        ).join('');
        document.getElementById('p-tag').innerHTML = categories.map(c => 
            `<option value="${c}">${c}</option>`
        ).join('');
    }

    window.setTab = (c) => { currentTab = c; renderTabs(); renderPosts(); };
    window.toggleAuthMode = () => { 
        const b = document.getElementById('auth-main-btn'); 
        b.innerText = b.innerText.includes('注册') ? '进入社区' : '立即注册'; 
    };
    window.showPostModal = () => { 
        if(!currentUser) { alert("请先登录"); return; }
        document.getElementById('postModal').style.display='flex'; 
    };
    window.hidePostModal = () => { 
        document.getElementById('postModal').style.display='none'; 
    };
    window.openSidebar = () => document.getElementById('sidebar').classList.add('active');
    window.closeSidebar = () => document.getElementById('sidebar').classList.remove('active');
    
    init();
})();
</script>
</body>
</html>
